services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "40000-40010:40000-40010"
    volumes:
      - app_data:/app/data
      - ./certs:/app/certs:ro
      - ./servers.docker.json:/app/servers.json:ro
      - ./config.yml:/app/config.yml:ro
    depends_on:
      - ftps-1
      - ftps-2
      - ftps-3
    networks:
      - ftpnet

  ftps-1:
    build:
      context: .
      dockerfile: Dockerfile.ftps
    restart: unless-stopped
    ports:
      - "2121:21"
      - "21000-21010:21000-21010"
    volumes:
      - ftps1_data:/ftp/foo
      - ./certs:/etc/vsftpd/certs:ro
    environment:
      - USERS=foo|S3cureP@ssw0rd!|/ftp/foo
      - ADDRESS=${HOST_IP:-127.0.0.1}
      - SSL=true
      - MIN_PORT=21000
      - MAX_PORT=21010
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 21"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - ftpnet

  ftps-2:
    build:
      context: .
      dockerfile: Dockerfile.ftps
    restart: unless-stopped
    ports:
      - "2122:21"
      - "21011-21021:21011-21021"
    volumes:
      - ftps2_data:/ftp/foo
      - ./certs:/etc/vsftpd/certs:ro
    environment:
      - USERS=foo|S3cureP@ssw0rd!|/ftp/foo
      - ADDRESS=${HOST_IP:-127.0.0.1}
      - SSL=true
      - MIN_PORT=21011
      - MAX_PORT=21021
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 21"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - ftpnet

  ftps-3:
    build:
      context: .
      dockerfile: Dockerfile.ftps
    restart: unless-stopped
    ports:
      - "2123:21"
      - "21022-21032:21022-21032"
    volumes:
      - ftps3_data:/ftp/foo
      - ./certs:/etc/vsftpd/certs:ro
    environment:
      - USERS=foo|S3cureP@ssw0rd!|/ftp/foo
      - ADDRESS=${HOST_IP:-127.0.0.1}
      - SSL=true
      - MIN_PORT=21022
      - MAX_PORT=21032
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 21"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - ftpnet

networks:
  ftpnet:
    driver: bridge

volumes:
  app_data:
  ftps1_data:
  ftps2_data:
  ftps3_data:
